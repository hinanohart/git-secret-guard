# Self-hosting config for the git-secret-guard repo.
#
# The test suite deliberately contains dummy tokens with valid shapes so
# the rules can be exercised. None of these are live credentials:
# AKIAIOSFODNN7EXAMPLE is AWS's published example key, the PGP block is
# a literal placeholder, and so on. Allowlist the rules that would
# otherwise fire on the fixtures.
#
# Downstream users should NOT copy this file — it disables rules that
# they almost certainly want enabled. See examples/config.toml for a
# sensible starting point.
allowlist = [
  "aws-access-key-id",
  "aws-secret-access-key",
  "github-pat-classic",
  "github-pat-fine-grained",
  "github-oauth-token",
  "gitlab-pat",
  "slack-token",
  "slack-webhook",
  "discord-webhook",
  "telegram-bot-token",
  "stripe-secret-key",
  "sendgrid-key",
  "mailgun-key",
  "openai-api-key",
  "anthropic-api-key",
  "google-api-key",
  "pem-private-key-block",
  "pgp-private-key-block",
  "jwt-token",
  "gcp-service-account-private-key",
  "azure-storage-connection-string",
  "generic-keyword-assignment",
]
