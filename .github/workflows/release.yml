name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install build
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: Upload artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/git-secret-guard
    permissions:
      id-token: write
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Download artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Create release with wheel + sdist attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        # --generate-notes fills the body from merged commits since the
        # previous tag; --verify-tag refuses to create a release for a
        # tag that doesn't actually exist in the repo. If a release with
        # this tag already exists (e.g. first-time backfill created it
        # manually), exit 0 rather than failing the workflow.
        run: |
          PKG="${REPO##*/}"
          VER="${TAG#v}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "$TAG" \
            --verify-tag \
            --generate-notes \
            dist/*
          # Prepend an install snippet to the autogenerated notes so
          # users don't have to guess the package name from the tag.
          INSTALL_NOTE=$(printf 'Install: `pipx install %s==%s`\n\nPyPI: https://pypi.org/project/%s/%s/\n\n---\n\n' \
            "$PKG" "$VER" "$PKG" "$VER")
          EXISTING=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
          gh release edit "$TAG" --repo "$REPO" --notes "${INSTALL_NOTE}${EXISTING}"
