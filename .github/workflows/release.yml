name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # sigstore OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      # Refuse to release anything containing the maintainer's real-identity
      # markers. A sibling repo (claude-backup-cron 0.1.0) leaked the local
      # username into the shipped wheel's METADATA because an example config
      # hard-coded a host-specific path. Tests are excluded because this
      # package intentionally ships credential-shape fixtures, which can
      # occasionally collide with an overly-broad grep.
      - name: Identity-leak guard (history-wide)
        run: |
          set -euo pipefail
          FRAG_A='run''za'
          FRAG_B='日'$'\u5411'
          FRAG_C='DESKTOP-[A-Z0-9]+'
          PATTERN="${FRAG_A}|${FRAG_A}isongpu|${FRAG_B}|${FRAG_C}|/home/${FRAG_A}|/Users/[a-z]+/[^/]*hina''no"
          FAIL=0
          REFS=$(git for-each-ref --format='%(refname)' refs/tags refs/heads refs/remotes)
          REFS="HEAD $REFS"
          for ref in $REFS; do
            if git grep -n -E "$PATTERN" "$ref" -- \
                ':!*.lock' ':!*.svg' ':!*.png' ':!*.jpg' ':!*.pdf' ':!docs/reviews/*' \
                ':!tests/**' ':!.github/workflows/release.yml' \
                > /tmp/leaks.txt 2>/dev/null; then
              echo "::error::Identity-leak at ref $ref:"
              cat /tmp/leaks.txt
              FAIL=1
            fi
          done
          exit $FAIL
      - name: Install build
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: Sign dist with sigstore
        uses: sigstore/gh-action-sigstore-python@61f6a500bbfdd9a2a339cf033e5421951fbc1cd2  # v3.0.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl
      - name: Move sigstore bundles aside (avoid twine upload error)
        run: |
          mkdir -p signatures
          mv dist/*.sigstore signatures/ 2>/dev/null || true
      - name: Upload artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/git-secret-guard
    permissions:
      id-token: write
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Create release with wheel + sdist attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        # --generate-notes fills the body from merged commits since the
        # previous tag; --verify-tag refuses to create a release for a
        # tag that doesn't actually exist in the repo. If a release with
        # this tag already exists (e.g. first-time backfill created it
        # manually), exit 0 rather than failing the workflow.
        run: |
          PKG="${REPO##*/}"
          VER="${TAG#v}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "$TAG" \
            --verify-tag \
            --generate-notes \
            dist/*
          # Prepend an install snippet to the autogenerated notes so
          # users don't have to guess the package name from the tag.
          INSTALL_NOTE=$(printf 'Install: `pipx install %s==%s`\n\nPyPI: https://pypi.org/project/%s/%s/\n\n---\n\n' \
            "$PKG" "$VER" "$PKG" "$VER")
          EXISTING=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)
          gh release edit "$TAG" --repo "$REPO" --notes "${INSTALL_NOTE}${EXISTING}"
